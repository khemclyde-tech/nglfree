<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NGL Free Review</title>
  <style>
    :root {
      --bg: #f4eee7;
      --bg-deep: #e9d9ca;
      --panel: rgba(255, 250, 244, 0.92);
      --panel-soft: rgba(255, 252, 248, 0.8);
      --ink: #201a16;
      --muted: #6e6258;
      --line: rgba(58, 42, 28, 0.12);
      --accent: #b45337;
      --accent-deep: #87331f;
      --accent-soft: rgba(180, 83, 55, 0.1);
      --success: #1f7a5b;
      --success-soft: rgba(31, 122, 91, 0.12);
      --danger: #a33b2d;
      --danger-soft: rgba(163, 59, 45, 0.12);
      --shadow: 0 24px 64px rgba(72, 44, 22, 0.12);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 255, 255, 0.8), transparent 30%),
        radial-gradient(circle at bottom right, rgba(200, 110, 82, 0.14), transparent 24%),
        linear-gradient(135deg, var(--bg) 0%, var(--bg-deep) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.18), transparent 72%);
      opacity: 0.45;
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(calc(100% - 20px), 1040px);
      margin: 0 auto;
      padding:
        max(18px, env(safe-area-inset-top))
        0
        max(28px, env(safe-area-inset-bottom));
    }

    .shell {
      border: 1px solid rgba(255, 255, 255, 0.62);
      border-radius: var(--radius-xl);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      padding: 20px;
    }

    .topbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px 16px;
      margin-bottom: 16px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border-radius: 999px;
      color: var(--accent-deep);
      background: rgba(255, 246, 238, 0.86);
      border: 1px solid rgba(180, 83, 55, 0.14);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .brand::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, #d97456, #8c3420);
      box-shadow: 0 0 0 5px rgba(180, 83, 55, 0.12);
    }

    .headline {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .headline h1 {
      margin: 0;
      font-size: clamp(1.35rem, 2.2vw, 1.8rem);
      letter-spacing: -0.03em;
    }

    .headline p {
      margin: 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1.3fr repeat(4, minmax(0, auto));
      gap: 12px;
      align-items: end;
      margin-bottom: 16px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: var(--panel-soft);
    }

    .field {
      min-width: 0;
    }

    .field label {
      display: inline-block;
      margin-bottom: 8px;
      color: #533f31;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .field input,
    .field select,
    .reply-box textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 11px 12px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.8);
      font: inherit;
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .field input:focus,
    .field select:focus,
    .reply-box textarea:focus {
      border-color: rgba(180, 83, 55, 0.34);
      box-shadow: 0 0 0 4px rgba(180, 83, 55, 0.08);
    }

    .actions {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button,
    a.btn-secondary,
    a.btn-primary,
    a.btn-danger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 14px;
      padding: 11px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform 160ms ease, filter 160ms ease, box-shadow 160ms ease;
    }

    button:hover:not(:disabled),
    a.btn-secondary:hover,
    a.btn-primary:hover,
    a.btn-danger:hover {
      transform: translateY(-1px);
      filter: saturate(1.03);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .btn-primary {
      color: #fff8f3;
      background: linear-gradient(135deg, #cb6446 0%, #a9442c 56%, #823120 100%);
      box-shadow: 0 14px 24px rgba(169, 68, 44, 0.18);
    }

    .btn-secondary {
      color: #49392d;
      background: rgba(255, 249, 243, 0.9);
      border: 1px solid var(--line);
    }

    .btn-danger {
      color: var(--danger);
      background: rgba(252, 244, 242, 0.92);
      border: 1px solid rgba(163, 59, 45, 0.16);
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      padding: 14px 15px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: rgba(255, 252, 248, 0.82);
    }

    .stat-label {
      margin: 0 0 8px;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .stat-value {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .feedback {
      margin: 0 0 14px;
      min-height: 20px;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .feedback.success {
      color: var(--success);
    }

    .feedback.error {
      color: var(--danger);
    }

    .list {
      display: grid;
      gap: 14px;
    }

    .message-card {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      background: rgba(255, 252, 248, 0.84);
    }

    .message-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .message-id {
      margin: 0 0 6px;
      color: #5a483a;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      word-break: break-all;
    }

    .message-time {
      margin: 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .badges {
      display: inline-flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: end;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 700;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .badge.status-new {
      color: var(--accent-deep);
      background: rgba(255, 245, 237, 0.96);
      border-color: rgba(180, 83, 55, 0.16);
    }

    .badge.status-replied {
      color: var(--success);
      background: rgba(244, 252, 249, 0.96);
      border-color: rgba(31, 122, 91, 0.16);
    }

    .badge.pulled {
      color: #5c4f43;
      background: rgba(94, 71, 47, 0.08);
      border-color: rgba(94, 71, 47, 0.08);
    }

    .message-body {
      margin: 0 0 14px;
      padding: 14px 15px;
      border-radius: var(--radius-md);
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(58, 42, 28, 0.08);
      white-space: pre-wrap;
      line-height: 1.7;
      word-break: break-word;
    }

    .reply-box label {
      display: inline-block;
      margin-bottom: 8px;
      color: #533f31;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .reply-box textarea {
      min-height: 98px;
      resize: vertical;
      line-height: 1.65;
    }

    .card-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .helper {
      color: var(--muted);
      font-size: 0.86rem;
    }

    .empty {
      padding: 28px 18px;
      text-align: center;
      border: 1px dashed rgba(58, 42, 28, 0.18);
      border-radius: var(--radius-lg);
      color: var(--muted);
      background: rgba(255, 252, 248, 0.64);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 860px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }

      .meta {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 640px) {
      .shell {
        padding: 16px;
      }

      .controls,
      .meta {
        grid-template-columns: 1fr;
      }

      .message-head,
      .card-actions {
        flex-direction: column;
        align-items: start;
      }

      .badges {
        justify-content: start;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="shell">
      <div class="topbar">
        <div class="headline">
          <div class="brand">NGL Free</div>
          <h1>审核页面</h1>
          <p>拉取匿名消息、补回复、删除内容。</p>
        </div>
      </div>

      <section class="controls">
        <div class="field">
          <label for="tokenInput">Admin Token</label>
          <input id="tokenInput" type="password" placeholder="输入管理员 token">
        </div>

        <div class="field">
          <label for="modeSelect">模式</label>
          <select id="modeSelect">
            <option value="unreplied">未回复</option>
            <option value="all">全部</option>
          </select>
        </div>

        <div class="field">
          <label for="limitSelect">每页数量</label>
          <select id="limitSelect">
            <option value="20">20</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
          </select>
        </div>

        <div class="actions">
          <button class="btn-primary" id="refreshBtn" type="button">刷新</button>
        </div>

        <div class="actions">
          <button class="btn-secondary" id="prevBtn" type="button">上一页</button>
          <button class="btn-secondary" id="nextBtn" type="button">下一页</button>
        </div>
      </section>

      <section class="meta">
        <article class="stat">
          <p class="stat-label">当前模式</p>
          <p class="stat-value" id="modeStat">未回复</p>
        </article>
        <article class="stat">
          <p class="stat-label">总数</p>
          <p class="stat-value" id="totalStat">0</p>
        </article>
        <article class="stat">
          <p class="stat-label">本页</p>
          <p class="stat-value" id="loadedStat">0</p>
        </article>
        <article class="stat">
          <p class="stat-label">偏移</p>
          <p class="stat-value" id="offsetStat">0</p>
        </article>
      </section>

      <p class="feedback" id="feedback" role="status" aria-live="polite">输入 token 后即可拉取消息。</p>
      <div class="list" id="list"></div>
      <div class="sr-only" id="liveRegion" aria-live="polite"></div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "nglfree_admin_token";

    const state = {
      token: "",
      mode: "unreplied",
      limit: 50,
      offset: 0,
      total: 0,
      items: [],
      offsetHistory: [],
      busy: false,
      cardImages: Object.create(null),
      cardSignatures: Object.create(null)
    };

    const elements = {
      tokenInput: document.getElementById("tokenInput"),
      modeSelect: document.getElementById("modeSelect"),
      limitSelect: document.getElementById("limitSelect"),
      refreshBtn: document.getElementById("refreshBtn"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      modeStat: document.getElementById("modeStat"),
      totalStat: document.getElementById("totalStat"),
      loadedStat: document.getElementById("loadedStat"),
      offsetStat: document.getElementById("offsetStat"),
      feedback: document.getElementById("feedback"),
      list: document.getElementById("list"),
      liveRegion: document.getElementById("liveRegion")
    };

    function setFeedback(message, tone = "") {
      elements.feedback.textContent = message;
      elements.feedback.className = tone ? `feedback ${tone}` : "feedback";
      elements.liveRegion.textContent = message;
    }

    function setBusy(nextBusy) {
      state.busy = nextBusy;
      elements.refreshBtn.disabled = nextBusy;
      elements.prevBtn.disabled = nextBusy || state.offsetHistory.length === 0;
      elements.nextBtn.disabled = nextBusy || state.offset + state.items.length >= state.total;
    }

    function getAuthHeaders() {
      const token = elements.tokenInput.value.trim();
      if (!token) {
        throw new Error("missing_token");
      }

      state.token = token;
      localStorage.setItem(STORAGE_KEY, token);

      return {
        "Content-Type": "application/json",
        "x-admin-token": token
      };
    }

    function formatTime(value) {
      if (!value) {
        return "时间未知";
      }

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return value;
      }

      return new Intl.DateTimeFormat("zh-CN", {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(date);
    }

    function updateStats() {
      elements.modeStat.textContent = state.mode === "all" ? "全部" : "未回复";
      elements.totalStat.textContent = `${state.total}`;
      elements.loadedStat.textContent = `${state.items.length}`;
      elements.offsetStat.textContent = `${state.offset}`;
      elements.prevBtn.disabled = state.busy || state.offsetHistory.length === 0;
      elements.nextBtn.disabled = state.busy || state.offset + state.items.length >= state.total;
    }

    function renderEmpty(message) {
      elements.list.innerHTML = `<div class="empty">${message}</div>`;
    }

    function createBadge(label, className) {
      const badge = document.createElement("span");
      badge.className = `badge ${className}`;
      badge.textContent = label;
      return badge;
    }

    function roundRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    function wrapText(ctx, text, maxWidth) {
      const lines = [];
      const chars = Array.from(text);
      let current = "";

      chars.forEach((char) => {
        const next = current + char;
        if (current && ctx.measureText(next).width > maxWidth) {
          lines.push(current);
          current = char;
          return;
        }

        current = next;
      });

      if (current) {
        lines.push(current);
      }

      return lines;
    }

    function fitLines(ctx, text, maxWidth, maxLines) {
      const normalized = (text || "").replace(/\r\n/g, "\n");
      const blocks = normalized.split("\n");
      const lines = [];

      blocks.forEach((block, index) => {
        if (!block) {
          lines.push("");
        } else {
          lines.push(...wrapText(ctx, block, maxWidth));
        }

        if (index !== blocks.length - 1 && block) {
          lines.push("");
        }
      });

      if (lines.length <= maxLines) {
        return lines;
      }

      const sliced = lines.slice(0, maxLines);
      let last = sliced[maxLines - 1].replace(/\s+$/, "");
      while (last && ctx.measureText(`${last}…`).width > maxWidth) {
        last = last.slice(0, -1);
      }
      sliced[maxLines - 1] = `${last}…`;
      return sliced;
    }

    function drawLines(ctx, lines, x, y, lineHeight) {
      lines.forEach((line, index) => {
        ctx.fillText(line, x, y + index * lineHeight);
      });
    }

    function drawCenteredLines(ctx, lines, centerX, startY, lineHeight) {
      ctx.save();
      ctx.textAlign = "center";
      lines.forEach((line, index) => {
        ctx.fillText(line, centerX, startY + index * lineHeight);
      });
      ctx.restore();
    }

    function generateCardImage(question, reply) {
      const canvas = document.createElement("canvas");
      canvas.width = 1080;
      canvas.height = 1;

      const ctx = canvas.getContext("2d");
      const frameX = 70;
      const frameWidth = 940;
      const frameRadius = 48;
      const centerX = frameX + frameWidth / 2;
      const textMaxW = 720;
      const minLines = 3;
      const qLineH = 72;
      const rLineH = 68;

      ctx.font = '700 56px "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif';
      const questionLines = fitLines(ctx, question || "(空留言)", textMaxW, 8);
      const qRows = Math.max(questionLines.length, minLines);

      ctx.font = '600 50px "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif';
      const replyLines = fitLines(ctx, reply || "(空回复)", textMaxW, 9);
      const rRows = Math.max(replyLines.length, minLines);

      const frameY = 70;
      const qTitleY = frameY + 136;
      const qAreaTop = qTitleY + 80;
      const qAreaH = qRows * qLineH;
      const dividerY = qAreaTop + qAreaH + 60;
      const rTitleY = dividerY + 100;
      const rAreaTop = rTitleY + 80;
      const rAreaH = rRows * rLineH;
      const watermarkY = rAreaTop + rAreaH + 70;
      const frameH = watermarkY + 60 - frameY;
      const canvasH = frameY + frameH + 70;

      canvas.height = canvasH;

      const bgGrad = ctx.createLinearGradient(0, 0, canvas.width, canvasH);
      bgGrad.addColorStop(0, "#f8f2eb");
      bgGrad.addColorStop(0.52, "#f0dfd0");
      bgGrad.addColorStop(1, "#ead2c2");
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, canvas.width, canvasH);

      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(150, 170, 180, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(930, 240, 140, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(900, canvasH - 230, 180, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.shadowColor = "rgba(82, 48, 22, 0.16)";
      ctx.shadowBlur = 60;
      ctx.shadowOffsetY = 24;
      roundRect(ctx, frameX, frameY, frameWidth, frameH, frameRadius);
      ctx.fillStyle = "rgba(255, 252, 248, 0.98)";
      ctx.fill();
      ctx.restore();

      roundRect(ctx, frameX, frameY, frameWidth, frameH, frameRadius);
      ctx.strokeStyle = "rgba(125, 86, 54, 0.08)";
      ctx.lineWidth = 2;
      ctx.stroke();

      roundRect(ctx, frameX, frameY, frameWidth, frameH, frameRadius);
      ctx.save();
      ctx.clip();
      const topGrad = ctx.createLinearGradient(frameX, frameY, frameX + frameWidth, dividerY);
      topGrad.addColorStop(0, "#fffaf4");
      topGrad.addColorStop(1, "#f8ede2");
      ctx.fillStyle = topGrad;
      ctx.fillRect(frameX, frameY, frameWidth, dividerY - frameY);
      const btmGrad = ctx.createLinearGradient(frameX, dividerY, frameX + frameWidth, frameY + frameH);
      btmGrad.addColorStop(0, "#f7ebe0");
      btmGrad.addColorStop(1, "#f2dcd0");
      ctx.fillStyle = btmGrad;
      ctx.fillRect(frameX, dividerY, frameWidth, frameH - (dividerY - frameY));
      ctx.restore();

      ctx.fillStyle = "rgba(180, 83, 55, 0.08)";
      ctx.fillRect(frameX + 80, dividerY - 1, frameWidth - 160, 2);
      ctx.beginPath();
      ctx.arc(centerX, dividerY, 8, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#8b3a24";
      ctx.font = '700 72px "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif';
      ctx.textAlign = "center";
      ctx.fillText("留言", centerX, qTitleY);

      ctx.fillStyle = "#1f1a16";
      ctx.font = '700 56px "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif';
      const qOffset = (qAreaH - questionLines.length * qLineH) / 2;
      drawCenteredLines(ctx, questionLines, centerX, qAreaTop + qOffset + qLineH * 0.8, qLineH);

      ctx.fillStyle = "#2e241d";
      ctx.font = '700 68px "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif';
      ctx.textAlign = "center";
      ctx.fillText("回复", centerX, rTitleY);

      ctx.fillStyle = "#2e241d";
      ctx.font = '600 50px "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif';
      const rOffset = (rAreaH - replyLines.length * rLineH) / 2;
      drawCenteredLines(ctx, replyLines, centerX, rAreaTop + rOffset + rLineH * 0.8, rLineH);

      ctx.fillStyle = "rgba(46, 36, 29, 0.62)";
      ctx.font = '700 28px "Avenir Next", "PingFang SC", "Microsoft YaHei", sans-serif';
      ctx.textAlign = "center";
      ctx.fillText("NGL Free", centerX, watermarkY);

      return canvas.toDataURL("image/png");
    }

    function ensureCardImage(item) {
      if (!item.reply) {
        return "";
      }

      const signature = `${item.text || ""}\u0000${item.reply || ""}`;
      if (state.cardSignatures[item.id] === signature && state.cardImages[item.id]) {
        return state.cardImages[item.id];
      }

      const image = generateCardImage(item.text || "", item.reply || "");
      state.cardSignatures[item.id] = signature;
      state.cardImages[item.id] = image;
      return image;
    }

    function downloadCardImage(image, id) {
      const link = document.createElement("a");
      link.href = image;
      link.download = `${id}.png`;
      document.body.append(link);
      link.click();
      link.remove();
    }

    function renderList() {
      elements.list.innerHTML = "";

      if (!state.items.length) {
        renderEmpty(state.mode === "all" ? "当前没有消息。" : "当前没有待审核消息。");
        updateStats();
        return;
      }

      const fragment = document.createDocumentFragment();

      state.items.forEach((item) => {
        const card = document.createElement("article");
        card.className = "message-card";

        const head = document.createElement("div");
        head.className = "message-head";

        const meta = document.createElement("div");
        const id = document.createElement("p");
        id.className = "message-id";
        id.textContent = item.id;
        const time = document.createElement("p");
        time.className = "message-time";
        time.textContent = formatTime(item.receivedAt);
        meta.append(id, time);

        const badges = document.createElement("div");
        badges.className = "badges";
        badges.append(
          createBadge(item.status === "replied" ? "已回复" : "待处理", item.status === "replied" ? "status-replied" : "status-new"),
          createBadge(item.pulled ? "已拉取" : "未拉取", "pulled")
        );

        head.append(meta, badges);

        const body = document.createElement("div");
        body.className = "message-body";
        body.textContent = item.text || "(空消息)";

        const replyBox = document.createElement("div");
        replyBox.className = "reply-box";

        const replyLabel = document.createElement("label");
        replyLabel.textContent = "回复";

        const replyInput = document.createElement("textarea");
        replyInput.value = item.reply || "";
        replyInput.placeholder = "输入审核回复...";

        const actions = document.createElement("div");
        actions.className = "card-actions";

        const helper = document.createElement("div");
        helper.className = "helper";
        helper.textContent = item.status === "replied" ? "可继续更新回复内容。" : "保存后该消息会变为已回复。";

        const buttons = document.createElement("div");
        buttons.className = "actions";

        const saveBtn = document.createElement("button");
        saveBtn.className = "btn-primary";
        saveBtn.type = "button";
        saveBtn.textContent = "更新、生成卡片";
        saveBtn.addEventListener("click", () => handleReply(item, replyInput, saveBtn));

        const deleteBtn = document.createElement("button");
        deleteBtn.className = "btn-danger";
        deleteBtn.type = "button";
        deleteBtn.textContent = "删除";
        deleteBtn.addEventListener("click", () => handleDelete(item.id, deleteBtn));

        buttons.append(saveBtn, deleteBtn);
        actions.append(helper, buttons);
        replyBox.append(replyLabel, replyInput);
        card.append(head, body, replyBox, actions);

        fragment.append(card);
      });

      elements.list.append(fragment);
      updateStats();
    }

    async function fetchMessages({ reset = false, silent = false } = {}) {
      try {
        const headers = getAuthHeaders();
        if (reset) {
          state.offset = 0;
          state.offsetHistory = [];
        }

        state.mode = elements.modeSelect.value;
        state.limit = Number.parseInt(elements.limitSelect.value, 10) || 50;

        setBusy(true);
        if (!silent) {
          setFeedback("正在拉取消息...");
        }

        const url = new URL("/api/pull", window.location.origin);
        url.searchParams.set("mode", state.mode);
        url.searchParams.set("limit", `${state.limit}`);
        url.searchParams.set("offset", `${state.offset}`);

        const response = await fetch(url, { headers });
        if (response.status === 401) {
          setFeedback("管理员 token 无效。", "error");
          return;
        }

        const data = await response.json();
        if (!response.ok || !Array.isArray(data.items)) {
          setFeedback(`拉取失败：${data.error || "unknown_error"}`, "error");
          return;
        }

        state.items = data.items;
        state.total = data.total || 0;
        renderList();
        if (!silent) {
          setFeedback(state.items.length ? "消息已更新。" : "列表已更新。", "success");
        }
      } catch (error) {
        if (error.message === "missing_token") {
          setFeedback("先输入管理员 token。", "error");
          elements.tokenInput.focus();
          return;
        }

        setFeedback("网络异常，暂时无法拉取消息。", "error");
      } finally {
        setBusy(false);
        updateStats();
      }
    }

    async function handleReply(item, input, button) {
      const reply = input.value.trim();
      if (!reply) {
        setFeedback("回复内容不能为空。", "error");
        input.focus();
        return;
      }

      try {
        const headers = getAuthHeaders();
        button.disabled = true;
        setFeedback("正在保存回复...");

        const response = await fetch("/api/reply", {
          method: "POST",
          headers,
          body: JSON.stringify({ id: item.id, reply })
        });

        const data = await response.json();
        if (!response.ok || !data.ok) {
          setFeedback(`保存失败：${data.error || "unknown_error"}`, "error");
          return;
        }

        const image = generateCardImage(item.text || "", reply);
        state.cardImages[item.id] = image;
        state.cardSignatures[item.id] = `${item.text || ""}\u0000${reply}`;
        await fetchMessages({ silent: true });
        setFeedback("回复已保存，卡片已生成并开始下载。", "success");
        downloadCardImage(image, item.id);
      } catch (error) {
        if (error.message === "missing_token") {
          setFeedback("先输入管理员 token。", "error");
          return;
        }

        setFeedback("网络异常，回复没有保存。", "error");
      } finally {
        button.disabled = false;
      }
    }

    async function handleDelete(id, button) {
      if (!window.confirm("确认删除这条消息？")) {
        return;
      }

      try {
        const headers = getAuthHeaders();
        button.disabled = true;
        setFeedback("正在删除消息...");

        const response = await fetch("/api/delete", {
          method: "POST",
          headers,
          body: JSON.stringify({ id })
        });

        const data = await response.json();
        if (!response.ok || !data.ok) {
          setFeedback(`删除失败：${data.error || "unknown_error"}`, "error");
          return;
        }

        delete state.cardImages[id];
        delete state.cardSignatures[id];

        if (state.items.length === 1 && state.offsetHistory.length) {
          state.offset = state.offsetHistory.pop();
        }

        await fetchMessages({ silent: true });
        setFeedback("消息已删除。", "success");
      } catch (error) {
        if (error.message === "missing_token") {
          setFeedback("先输入管理员 token。", "error");
          return;
        }

        setFeedback("网络异常，删除没有完成。", "error");
      } finally {
        button.disabled = false;
      }
    }

    elements.refreshBtn.addEventListener("click", () => {
      fetchMessages({ reset: true });
    });

    elements.modeSelect.addEventListener("change", () => {
      fetchMessages({ reset: true });
    });

    elements.limitSelect.addEventListener("change", () => {
      fetchMessages({ reset: true });
    });

    elements.prevBtn.addEventListener("click", () => {
      if (!state.offsetHistory.length) {
        return;
      }

      state.offset = state.offsetHistory.pop();
      fetchMessages();
    });

    elements.nextBtn.addEventListener("click", () => {
      if (state.offset + state.items.length >= state.total) {
        return;
      }

      state.offsetHistory.push(state.offset);
      state.offset += state.items.length;
      fetchMessages();
    });

    (function init() {
      const savedToken = localStorage.getItem(STORAGE_KEY) || "";
      elements.tokenInput.value = savedToken;
      state.token = savedToken;
      updateStats();
      renderEmpty("输入 token 后点击刷新，即可查看审核列表。");
    })();
  </script>
</body>
</html>
